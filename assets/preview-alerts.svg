<svg width="900" height="520" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="chartBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1220;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#060c18;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="priceLineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.6"/>
      <stop offset="60%" style="stop-color:#f97316;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1"/>
    </linearGradient>
    <filter id="glowF">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="alertGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="520" fill="url(#chartBg)"/>

  <!-- Header -->
  <text x="30" y="42" font-family="'Courier New', monospace" font-size="22" font-weight="bold" fill="#f97316" filter="url(#glowF)">FLARE</text>
  <text x="100" y="42" font-family="'Courier New', monospace" font-size="13" fill="#ffffff50">/ SOL price monitor</text>
  <text x="820" y="36" font-family="'Courier New', monospace" font-size="13" fill="#fbbf24" text-anchor="end">$184.20</text>
  <text x="820" y="52" font-family="'Courier New', monospace" font-size="10" fill="#4ade80" text-anchor="end">+3.5% 24h</text>

  <line x1="30" y1="60" x2="870" y2="60" stroke="#ffffff0a" stroke-width="1"/>

  <!-- Y-axis labels -->
  <text x="60" y="90" font-family="'Courier New', monospace" font-size="10" fill="#ffffff30" text-anchor="end">$220</text>
  <text x="60" y="148" font-family="'Courier New', monospace" font-size="10" fill="#ffffff30" text-anchor="end">$200</text>
  <text x="60" y="206" font-family="'Courier New', monospace" font-size="10" fill="#ef4444" text-anchor="end" font-weight="bold">$200</text>
  <text x="60" y="264" font-family="'Courier New', monospace" font-size="10" fill="#ffffff30" text-anchor="end">$180</text>
  <text x="60" y="322" font-family="'Courier New', monospace" font-size="10" fill="#ffffff30" text-anchor="end">$160</text>
  <text x="60" y="380" font-family="'Courier New', monospace" font-size="10" fill="#ef4444" text-anchor="end" font-weight="bold">$150</text>

  <!-- Grid lines -->
  <line x1="70" y1="90" x2="870" y2="90" stroke="#ffffff07" stroke-width="1"/>
  <line x1="70" y1="148" x2="870" y2="148" stroke="#ffffff07" stroke-width="1"/>
  <line x1="70" y1="264" x2="870" y2="264" stroke="#ffffff07" stroke-width="1"/>
  <line x1="70" y1="322" x2="870" y2="322" stroke="#ffffff07" stroke-width="1"/>

  <!-- Alert lines - price_above $200 -->
  <line x1="70" y1="200" x2="870" y2="200" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.8"/>
  <text x="875" y="204" font-family="'Courier New', monospace" font-size="9" fill="#ef4444">↑ $200</text>

  <!-- Alert lines - price_below $150 -->
  <line x1="70" y1="378" x2="870" y2="378" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.8"/>
  <text x="875" y="382" font-family="'Courier New', monospace" font-size="9" fill="#60a5fa">↓ $150</text>

  <!-- Price area fill under curve -->
  <path d="M70,300 L130,290 L200,280 L270,295 L340,285 L410,270 L470,262 L530,255 L600,245 L660,252 L730,238 L800,242 L870,245 L870,420 L70,420 Z" fill="#f97316" opacity="0.06"/>

  <!-- Price line (SOL) -->
  <polyline points="70,300 130,290 200,280 270,295 340,285 410,270 470,262 530,255 600,245 660,252 730,238 800,242 870,245" fill="none" stroke="url(#priceLineGrad)" stroke-width="2.5"/>

  <!-- Current price dot -->
  <circle cx="870" cy="245" r="5" fill="#fbbf24" filter="url(#glowF)"/>
  <circle cx="870" cy="245" r="9" fill="none" stroke="#fbbf2440" stroke-width="1.5"/>

  <!-- Zone shading: zone between current and $200 alert -->
  <rect x="70" y="200" width="800" height="45" fill="#ef4444" opacity="0.04"/>
  <text x="470" y="222" font-family="'Courier New', monospace" font-size="9" fill="#ef444460" text-anchor="middle">ALERT ZONE  —  8.6% to trigger</text>

  <!-- Zone below $150 -->
  <rect x="70" y="378" width="800" height="42" fill="#60a5fa" opacity="0.04"/>
  <text x="470" y="396" font-family="'Courier New', monospace" font-size="9" fill="#60a5fa60" text-anchor="middle">FLOOR ALERT  —  18.5% buffer</text>

  <!-- Alert popup: triggered example -->
  <rect x="580" y="130" width="260" height="90" rx="8" fill="#1a0a00" stroke="#f97316" stroke-width="2" filter="url(#alertGlow)"/>
  <rect x="580" y="130" width="260" height="28" rx="8" fill="#f97316" opacity="0.9"/>
  <rect x="580" y="146" width="260" height="12" fill="#f97316" opacity="0.9"/>
  <text x="710" y="149" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">FLARE  ALERT</text>
  <text x="600" y="175" font-family="'Courier New', monospace" font-size="11" fill="#fbbf24">SOL  +10% DROP ALERT</text>
  <text x="600" y="192" font-family="'Courier New', monospace" font-size="11" fill="#ffffff">Price: $184.20</text>
  <text x="600" y="208" font-family="'Courier New', monospace" font-size="11" fill="#f97316">Threshold: $166 hit</text>

  <!-- Vertical line from alert to chart -->
  <line x1="660" y1="220" x2="660" y2="252" stroke="#f97316" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <circle cx="660" cy="252" r="4" fill="#f97316" opacity="0.8"/>

  <!-- Active alerts list -->
  <line x1="30" y1="430" x2="870" y2="430" stroke="#ffffff10" stroke-width="1"/>
  <text x="30" y="452" font-family="'Courier New', monospace" font-size="10" fill="#ffffff40" letter-spacing="2">ACTIVE ALERTS</text>

  <rect x="30" y="460" width="155" height="30" rx="4" fill="#ef444415" stroke="#ef444430" stroke-width="1"/>
  <text x="44" y="479" font-family="'Courier New', monospace" font-size="10" fill="#ef4444">SOL above $200</text>

  <rect x="196" y="460" width="155" height="30" rx="4" fill="#60a5fa15" stroke="#60a5fa30" stroke-width="1"/>
  <text x="210" y="479" font-family="'Courier New', monospace" font-size="10" fill="#60a5fa">SOL below $150</text>

  <rect x="362" y="460" width="160" height="30" rx="4" fill="#f97316" opacity="0.1" stroke="#f9731640" stroke-width="1"/>
  <text x="376" y="479" font-family="'Courier New', monospace" font-size="10" fill="#f97316">SOL -10% drop</text>

  <rect x="534" y="460" width="145" height="30" rx="4" fill="#a78bfa15" stroke="#a78bfa30" stroke-width="1"/>
  <text x="548" y="479" font-family="'Courier New', monospace" font-size="10" fill="#a78bfa">JUP above $2.00</text>

  <rect x="690" y="460" width="180" height="30" rx="4" fill="#4ade8015" stroke="#4ade8030" stroke-width="1"/>
  <text x="704" y="479" font-family="'Courier New', monospace" font-size="10" fill="#4ade80">BONK surge +25%</text>

  <text x="450" y="510" font-family="'Courier New', monospace" font-size="9" fill="#ffffff15" text-anchor="middle">FLARE  •  SOLANA PRICE ALERTS  •  CLAUDE AGENT SDK</text>
</svg>
